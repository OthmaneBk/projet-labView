<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Bella Pizza — Inscription</title>
    <link rel="stylesheet" href="../style/auth.css">
    <script src="../js/data.js"></script>
    <script src="../js/route.js"></script>
    <script src="../js/auth.js"></script>
</head>
<body>

    <header class="header">
        <div class="header-content">
            <a href="home.html" class="header-brand">
                <span class="header-logo">🍕</span>
                <div class="header-text">
                    <h1>La Bella Pizza</h1>
                    <p>Créez votre compte</p>
                </div>
            </a>
            <nav class="header-nav">
                <a href="home.html" class="nav-link">Accueil</a>
                <a href="login.html" class="nav-link">Se connecter</a>
            </nav>
        </div>
    </header>

    <main class="auth-main">
        <div class="auth-card">
            <h2 class="auth-title">Inscription</h2>

            <p id="error-msg" class="error-msg hidden"></p>

            <form id="register-form" onsubmit="handleRegister(event);">
                <div class="form-group">
                    <label for="nom">Nom complet</label>
                    <input type="text" id="nom" placeholder="Jean Dupont" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="exemple@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="confirm">Confirmer le mot de passe</label>
                    <input type="password" id="confirm" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">S'inscrire</button>
            </form>

            <p class="auth-link">Déjà un compte ? <a href="login.html">Se connecter</a></p>
        </div>
    </main>

</body>
</html>
