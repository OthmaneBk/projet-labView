<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Bella Pizza — Inscription</title>
    <link rel="stylesheet" href="../style/auth.css">
    <script src="../js/data.js"></script>
    <script src="../js/route.js"></script>
    <script src="../js/auth.js"></script>
</head>
<body onload="initRegister();">

    <header class="header">
        <div class="header-content">
            <a href="home.html" class="header-brand">
                <span class="header-logo">🍕</span>
                <div class="header-text">
                    <h1>La Bella Pizza</h1>
                    <p>Créez votre compte</p>
                </div>
            </a>
            <nav class="header-nav">
                <a href="home.html" class="nav-link">Accueil</a>
                <a href="login.html" class="nav-link">Se connecter</a>
            </nav>
        </div>
    </header>

    <main class="auth-main">
        <div class="auth-card">
            <h2 class="auth-title">Inscription</h2>

            <p id="success-msg" class="success-msg hidden"></p>
            <p id="error-msg" class="error-msg hidden"></p>

            <form id="register-form" onsubmit="handleRegister(event);">
                <div class="form-row">
                    <div class="form-group">
                        <label for="nom">Nom <span class="required">*</span></label>
                        <input type="text" id="nom" placeholder="Dupont" required>
                    </div>
                    <div class="form-group">
                        <label for="prenom">Prénom <span class="required">*</span></label>
                        <input type="text" id="prenom" placeholder="Jean" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" placeholder="exemple@email.com" required>
                </div>
                <div class="form-group">
                    <label for="telephone">Téléphone</label>
                    <input type="tel" id="telephone" placeholder="0612345678">
                </div>
                <div class="form-group">
                    <label for="adresse">Adresse de livraison</label>
                    <input type="text" id="adresse" placeholder="12 rue de la Paix, Paris">
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe <span class="required">*</span></label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="confirm">Confirmer le mot de passe <span class="required">*</span></label>
                    <input type="password" id="confirm" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">S'inscrire</button>
            </form>

            <p class="auth-link">Déjà un compte ? <a href="login.html">Se connecter</a></p>
        </div>
    </main>

</body>
</html>
