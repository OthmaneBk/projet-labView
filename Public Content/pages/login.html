<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Bella Pizza — Connexion</title>
    <link rel="stylesheet" href="../style/auth.css">
    <script src="../js/data.js"></script>
    <script src="../js/route.js"></script>
    <script src="../js/auth.js"></script>
</head>
<body onload="initLogin();">

    <header class="header">
        <div class="header-content">
            <a href="home.html" class="header-brand">
                <span class="header-logo">🍕</span>
                <div class="header-text">
                    <h1>La Bella Pizza</h1>
                    <p>Connectez-vous pour commander</p>
                </div>
            </a>
            <nav class="header-nav">
                <a href="home.html" class="nav-link">Accueil</a>
                <a href="register.html" class="nav-link">S'inscrire</a>
            </nav>
        </div>
    </header>

    <main class="auth-main">
        <div class="auth-card">
            <h2 class="auth-title">Connexion</h2>

            <p id="success-msg" class="success-msg hidden"></p>
            <p id="error-msg" class="error-msg hidden"></p>

            <form id="login-form" onsubmit="handleLogin(event);">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="exemple@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">Se connecterr</button>
            </form>

            <p class="auth-link">Pas encore de compte ? <a href="register.html">S'inscrire</a></p>
        </div>
    </main>

</body>
</html>
